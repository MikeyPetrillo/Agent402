name: Deploy to Railway

on:
  push:
    paths:
      - ".github/trigger-probe"
      - ".github/trigger-deploy"
  workflow_dispatch:
    inputs:
      mode:
        description: "probe (test facilitators only) or deploy"
        default: "deploy"

jobs:
  probe:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'probe' || contains(join(github.event.commits.*.message), '[probe]')
    runs-on: ubuntu-latest
    steps:
      - name: Probe public x402 facilitators
        run: |
          for u in https://facilitator.payai.network https://facilitator.x402.rs https://x402.org/facilitator; do
            echo "=== GET $u/supported ==="
            curl -s --max-time 15 "$u/supported" | head -c 3000 || echo "(unreachable)"
            echo; echo
          done

  deploy:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy' || contains(join(github.event.commits.*.message), '[deploy]')
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      # The key ID and wallet address are not sensitive (the wallet address is
      # public on-chain); only the Railway token and CDP secret live in secrets.
      CDP_KEY_ID: ${{ secrets.CDP_API_KEY_ID || 'ff16e708-0590-4a24-8a17-b0e978143f68' }}
      CDP_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
      WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS || '0xaBF4FAbd7c416fB67202E5f9002389Fc75e2a9D0' }}
      NETWORK: ${{ vars.NETWORK || 'base' }}
      # CDP keys take priority in the server's facilitator selection, so this
      # default is harmless once CDP_API_KEY_ID/SECRET secrets are added.
      FACILITATOR_URL: ${{ vars.FACILITATOR_URL || 'https://facilitator.payai.network' }}
    steps:
      - name: Mask sensitive inputs
        run: |
          [ -n "$RAILWAY_API_TOKEN" ] && echo "::add-mask::$RAILWAY_API_TOKEN"
          [ -n "$CDP_KEY_SECRET" ] && echo "::add-mask::$CDP_KEY_SECRET"
          [ -n "$RAILWAY_API_TOKEN" ] || { echo "No Railway token provided"; exit 1; }
          [ -n "$WALLET_ADDRESS" ] || { echo "No wallet address provided"; exit 1; }

      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Detect token type
        id: token
        run: |
          if curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_API_TOKEN" -H "Content-Type: application/json" \
              -d '{"query":"query { me { name } }"}' | grep -q '"name"'; then
            echo "type=account" >> "$GITHUB_OUTPUT"
            echo "Token works at account level."
          elif RAILWAY_API_TOKEN= RAILWAY_TOKEN="$RAILWAY_API_TOKEN" railway status; then
            echo "type=project" >> "$GITHUB_OUTPUT"
            echo "Token is a PROJECT token; will deploy into its project directly."
          else
            echo "Token is not valid as an account token or a project token." >&2
            echo "Create an ACCOUNT token at https://railway.com/account/tokens (no workspace scope)," >&2
            echo "or a PROJECT token inside the target project's settings, and update the RAILWAY_TOKEN secret." >&2
            exit 1
          fi

      - name: Create or link project (account token)
        if: steps.token.outputs.type == 'account'
        run: |
          set -x
          if railway list 2>/dev/null | grep -qi 'agent402'; then
            railway link --project agent402 --environment production \
              || railway link --project agent402
          else
            railway init --name agent402
          fi
          railway status || true

      - name: Use project token for remaining steps
        if: steps.token.outputs.type == 'project'
        run: |
          echo "RAILWAY_TOKEN=$RAILWAY_API_TOKEN" >> "$GITHUB_ENV"
          echo "RAILWAY_API_TOKEN=" >> "$GITHUB_ENV"

      - name: Create service and set variables
        run: |
          set -x
          railway add --service agent402 || echo "service may already exist"
          VARS=(--set "WALLET_ADDRESS=$WALLET_ADDRESS" --set "NETWORK=$NETWORK")
          [ -n "$FACILITATOR_URL" ] && VARS+=(--set "FACILITATOR_URL=$FACILITATOR_URL")
          [ -n "$CDP_KEY_ID" ] && [ -n "$CDP_KEY_SECRET" ] && VARS+=(--set "CDP_API_KEY_ID=$CDP_KEY_ID" --set "CDP_API_KEY_SECRET=$CDP_KEY_SECRET")
          railway variables "${VARS[@]}" --service agent402 --skip-deploys \
            || railway variables "${VARS[@]}" --skip-deploys \
            || railway variables "${VARS[@]}"

      - name: Generate public domain
        id: domain
        run: |
          set -x
          railway domain --service agent402 --json > domain.json || railway domain --json > domain.json || railway domain --service agent402 || railway domain
          cat domain.json 2>/dev/null || true
          URL=$(grep -o '"domain"[^,}]*' domain.json 2>/dev/null | head -1 | sed 's/.*: *"\(.*\)"/\1/') || true
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "PUBLIC URL: https://$URL"

      - name: Set BASE_URL and deploy
        run: |
          set -x
          URL="${{ steps.domain.outputs.url }}"
          if [ -n "$URL" ]; then
            railway variables --set "BASE_URL=https://$URL" --service agent402 --skip-deploys \
              || railway variables --set "BASE_URL=https://$URL" --skip-deploys || true
          fi
          railway up --ci --service agent402 || railway up --ci

      - name: Verify deployment
        run: |
          URL="${{ steps.domain.outputs.url }}"
          [ -n "$URL" ] || { echo "No domain captured; check logs above"; exit 1; }
          echo "Waiting for https://$URL/health …"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://$URL/health" || echo 000)
            [ "$code" = "200" ] && break
            sleep 10
          done
          echo "health: $code"
          [ "$code" = "200" ] || exit 1
          echo "=== pricing ==="
          curl -s "https://$URL/api/pricing"
          echo; echo "=== 402 check ==="
          paid=$(curl -s -o /dev/null -w '%{http_code}' -X POST "https://$URL/api/extract" -H 'Content-Type: application/json' -H 'Accept: application/json' -d '{"url":"https://example.com"}')
          echo "unpaid request returned HTTP $paid (expect 402)"
          [ "$paid" = "402" ] || exit 1
          echo
          echo "🚀 LIVE: https://$URL"
