[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node src/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# State (memory/pow/stats SQLite on the volume) assumes a single writer.
# Do not scale replicas without moving state to a server database first.
numReplicas = 1
